name: Update Contributors

on:
  push:
    branches:
      - main
    paths:
      - '.all-contributorsrc'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Contributors Table
        run: npx all-contributors-cli generate

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update contributors table [skip ci]"
          file_pattern: README.md
